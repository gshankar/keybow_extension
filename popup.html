<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 16px;
      width: 250px;
      margin: 0;
      color: #333;
    }
    .header {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      border-bottom: 1px solid #eaeaea;
      padding-bottom: 8px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-size: 14px;
    }
    input[type=checkbox] {
      width: 18px;
      height: 18px;
      margin-right: 10px;
      cursor: pointer;
    }
    .help-text {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      margin-left: 28px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="header">Keybow Reactions</div>
  <label class="toggle-row">
    <input type="checkbox" id="debug-toggle">
    Enable On-Screen Debug Toast
  </label>
  <div class="help-text">
    Shows a temporary green popup whenever a Numpad key is registered by the extension.
  </div>
  <script src="popup.js"></script>
</body>
</html>
